name: Build and Test

on:
  push:
    branches: [ main, feature/** ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Restore dependencies
        run: dotnet restore InsuranceQuote.sln

      - name: Build
        run: dotnet build InsuranceQuote.sln --no-restore

      - name: Run BDD tests
        run: dotnet test InsuranceQuote.sln --no-build --verbosity normal
